<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syluxent - Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('theme_overrides_css') }}">
    <script defer src="{{ url_for('static', filename='js/system-states.js') }}"></script>
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; background: linear-gradient(135deg, var(--bg-canvas), var(--brand-yellow)); }
        .auth-card { width: 100%; max-width: 420px; background: white; border: 1px solid var(--border-color); border-radius: var(--radius-xl); padding: 2rem; box-shadow: var(--shadow); }
        .auth-card h1 { margin-bottom: 0.5rem; }
        .auth-card p { color: var(--text-muted); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 0.4rem; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-lg); }
        .auth-actions { display: grid; gap: 0.75rem; }
        .auth-actions .btn { text-align: center; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Forgot Password</h1>
            <p>Enter your username. The administrator will receive a password reset notification.</p>
            <form method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" name="username" required autocomplete="username">
                </div>
                <div class="auth-actions">
                    <button class="btn btn-primary" type="submit">Notify Administrator</button>
                    <a class="btn btn-outline" href="{{ url_for('login') }}">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
